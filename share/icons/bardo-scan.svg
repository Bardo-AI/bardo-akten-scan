<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Bardo Akten-Scan Icon
       Scanner-Symbol mit Akten-Stapel + grünem Bardo-Akzent -->

  <!-- Hintergrund-Plate (Akte/Papierstapel) -->
  <g transform="translate(48, 32)">
    <!-- Stapel hinten (Schatten) -->
    <rect x="8" y="8" width="148" height="184" rx="4"
          fill="#d4d4d4" stroke="#888" stroke-width="2"/>
    <!-- Stapel mitte -->
    <rect x="4" y="4" width="148" height="184" rx="4"
          fill="#ededed" stroke="#888" stroke-width="2"/>
    <!-- Stapel vorne -->
    <rect x="0" y="0" width="148" height="184" rx="4"
          fill="#fafafa" stroke="#444" stroke-width="2"/>

    <!-- Text-Linien -->
    <g stroke="#666" stroke-width="2" stroke-linecap="round">
      <line x1="14" y1="22" x2="120" y2="22"/>
      <line x1="14" y1="34" x2="134" y2="34"/>
      <line x1="14" y1="46" x2="100" y2="46"/>
      <line x1="14" y1="64" x2="134" y2="64"/>
      <line x1="14" y1="76" x2="120" y2="76"/>
      <line x1="14" y1="88" x2="134" y2="88"/>
      <line x1="14" y1="100" x2="90" y2="100"/>
      <line x1="14" y1="118" x2="134" y2="118"/>
      <line x1="14" y1="130" x2="124" y2="130"/>
      <line x1="14" y1="142" x2="100" y2="142"/>
      <line x1="14" y1="160" x2="134" y2="160"/>
      <line x1="14" y1="172" x2="110" y2="172"/>
    </g>
  </g>

  <!-- Scanner-Lichtbalken (orange/gelb, läuft schräg über) -->
  <g transform="translate(40, 110)">
    <rect x="0" y="0" width="176" height="14" rx="2"
          fill="#fb923c" opacity="0.85"/>
    <rect x="0" y="0" width="176" height="14" rx="2"
          fill="none" stroke="#c2410c" stroke-width="1.5"/>
    <line x1="6" y1="7" x2="170" y2="7" stroke="#fff" stroke-width="2"
          stroke-dasharray="4,3" opacity="0.8"/>
  </g>

  <!-- Bardo-Marke unten (grüner Punkt + B) -->
  <g transform="translate(40, 220)">
    <circle cx="14" cy="14" r="14" fill="#2c5e2c"/>
    <text x="14" y="20" font-family="DejaVu Sans, Sans" font-size="18"
          font-weight="bold" text-anchor="middle" fill="white">B</text>
    <text x="40" y="22" font-family="DejaVu Sans, Sans" font-size="20"
          font-weight="600" fill="#1a3a1a">ardo Akten-Scan</text>
  </g>
</svg>
